<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
      id="info"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>discord clone</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="directory">

      <img class = logo src ="logo.png">

    </div>

<div class = "channel-list">
      <div class = "channel-header">
        <h1>chats</h1>
        <button id="add-channel-btn" class = "add-channels">+</button>
      </div>
      <div id="dynamic-channels">
        <div class = "channel" data-channel-id="1"># general</div>
        <div class = "channel" data-channel-id="2"># memes</div>
        <div class = "channel" data-channel-id="3"># gaming</div>
        <div class = "channel" data-channel-id="4"># music</div>
      </div>
    </div>

    <!-- Create Channel -->
    <div id="channel-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2>Create Channel</h2>
        <input type="text" id="channel-name-input" placeholder="# new-channel" maxlength="50" />
        <div class="modal-buttons">
          <button id="create-channel-cancel">Cancel</button>
          <button id="create-channel-confirm">Create</button>

        </div>
      </div>
    </div>

    <div class = "chat-area">

      <div id="messageArea" class="messages">
        <div class = "message-placeholder">
          <span class = "username-placeholder">user1:</span>
          <span class = "text">Hello everyone!</span>
        </div>
        <div class = "message-placeholder">
          <span class = "username-placeholder">user2:</span>
          <span class = "text">Hi user1! How are you?</span>
        </div>
      </div>

      <form id="form" class="input-area">
        <input type="text" id="message" placeholder="Message" />
      </form>

    </div>

      <div class = "users-list">
        <div class = "user-placeholder">user1</div>
        <div class = "user-placeholder">user2</div>
        <div class = "user-placeholder">user3</div>

      </div>
  <script src="renderer.js"></script>  
  </body>  
</html>
