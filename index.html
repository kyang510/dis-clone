<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:3000 ws://localhost:3000; img-src 'self' data: blob:; media-src 'self' data: blob:"
    />
    <title>discord clone</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
<div class="left-sidebar">
    <div class="directory">

      <img class = logo src ="logo.png">

    </div>
    <!-- background behind voice controls -->
    <div class="directory-1"></div>
    <div class="channel-list-1"></div>

<div class = "channel-list">
      <div class = "channel-header">
        <h1>chats</h1>
        <button id="add-channel-btn" class="add-channels">+</button>
        <button id="login-btn" class="login-btn">=</button>
        <button id="sign-up-btn" class="sigh-up">-</button>
      </div>
      <div id="dynamic-channels">
        <div class = "channel" data-channel-id="1"># general</div>
        <div class = "channel" data-channel-id="2"># memes</div>
        <div class = "channel" data-channel-id="3"># gaming</div>
        <div class = "channel" data-channel-id="4"># music</div>
      </div>
      <div class="voice-section">
        <div class="voice-header">
          <h2>voice channels</h2>
          <button id="add-voice-channel-btn" class="add-voice-channel">+</button>
        </div>
        <div id="dynamic-voice-channels"></div>
      </div>
    </div>

          <!-- voice control panel -->
      <div id="voice-control-panel" class="voice-control-panel">
        <div>
          <div class="voice-status-label">Voice disconnected</div>
          <div id="voice-status-channel" class="voice-status-channel">Not connected</div>
        </div>
        <div class="voice-actions">
          <button id="mute-voice-btn" type="button" disabled>Mute</button>
          <button id="deafen-voice-btn" type="button" disabled>Deafen</button>
          <button id="leave-voice-btn" type="button" disabled>Leave</button>
          <button id="voice-settings-btn" type="button">Settings</button>
        </div>
      </div>
  </div>

    <!-- Create Channel -->
    <div id="channel-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2 id="channel-modal-title">Create Channel</h2>
        <input type="text" id="channel-name-input" placeholder="# new-channel" maxlength="50" />
        <div class="modal-buttons">
          <button id="create-channel-cancel">Cancel</button>
          <button id="create-channel-confirm">Create</button>

        </div>
      </div>
    </div>

    <!-- Create Voice Channel -->
    <div id="voice-channel-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2 id="voice-channel-modal-title">Create Voice Channel</h2>
        <input type="text" id="voice-channel-name-input" placeholder="New Voice Chat" maxlength="50" />
        <div class="modal-buttons">
          <button id="create-voice-channel-cancel">Cancel</button>
          <button id="create-voice-channel-confirm">Create</button>

        </div>
      </div>
    </div>

    <div id="channel-context-menu" class="channel-context-menu" hidden>
      <button type="button" data-channel-action="create-text">Create Text Channel</button>
      <button type="button" data-channel-action="create-voice">Create Voice Channel</button>
      <div class="channel-context-divider"></div>
      <button type="button" data-channel-action="edit">Edit Channel</button>
      <button type="button" data-channel-action="duplicate">Duplicate Channel</button>
      <button type="button" data-channel-action="delete" class="danger">Delete Channel</button>
    </div>

    <div id="message-context-menu" class="message-context-menu" hidden>
      <button type="button" data-message-action="copy">Copy Message</button>
      <button type="button" data-message-action="edit">Edit Message</button>
      <button type="button" data-message-action="delete" class="danger">Delete Message</button>
    </div>

    <div class = "chat-area">

      <div id="messageArea" class="messages"></div>

      <form id="form" class="input-area">
        <button type="button" id="upload-btn" class="upload-btn" title="Attach file">+</button>
        <input type="file" id="media-upload" accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,audio/mpeg,audio/mp3,.jpg,.jpeg,.png,.webp,.gif,.mp4,.mp3" hidden />
        <div id="selected-attachment" class="selected-attachment" hidden>
          <span id="selected-attachment-name"></span>
          <button type="button" id="clear-attachment" title="Remove attachment">x</button>
        </div>
        <input type="text" id="message" placeholder = "Message" />
      </form>
    </div>

    <!-- Voice Settings -->
    <div id="voice-settings-modal" class="modal" style="display: none;">
      <div class="modal-content voice-settings-content">
        <h2>Settings</h2>

        <h3>Voice</h3>

        <label class="settings-field" for="mic-device-select">
          <span>Microphone</span>
          <select id="mic-device-select"></select>
        </label>

        <label class="settings-field" for="audio-output-select">
          <span>Speaker</span>
          <select id="audio-output-select"></select>
        </label>

        <div id="audio-output-warning" class="settings-message" hidden>
          Speaker selection is unavailable.
        </div>

        <div class="appearance-settings">
          <h3>Appearance</h3>
          <div id="appearance-controls" class="appearance-controls"></div>
          <button id="appearance-reset" type="button">Reset Colors</button>
        </div>

        <div class="modal-buttons">
          <button id="voice-settings-refresh" type="button">Refresh</button>
          <button id="voice-settings-close" type="button">Close</button>
        </div>
      </div>
    </div>

      <div class = "users-list">
        <div id="database-users"></div>
    </div>

    <div id="remote-audio-container" aria-hidden="true"></div>

    <div id="remote-volume-menu" class="remote-volume-menu" hidden>
      <div id="remote-volume-menu-name" class="remote-volume-menu-name"></div>
      <div class="remote-volume-row">
        <span>Volume</span>
        <span id="remote-volume-value">100%</span>
      </div>
      <input
        id="remote-volume-slider"
        type="range"
        min="0"
        max="200"
        step="1"
        value="100"
      />
    </div>
      
    <!-- Create Account Modal -->
    <div id="signup-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2>Create Account</h2>
        <form id="signupForm">
          <input type = "text" id="username" placeholder="Username" required/>
          <input type = "email" id="email" placeholder="Email" required/>
          <input type ="password" id="password" placeholder="Password" required/>

          <div class="modal-buttons">
            <button id = "signup-cancel" type="button">Cancel</button>
            <button id = "sign-up" type="submit">Sign up</button>
          </div>
        </form>

        <div id="signup-message"></div>
      </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2>Login</h2>

        <form id="loginForm">
          <input type="email" id="login-email" placeholder="Email" required />
          <input type="password" id="login-password" placeholder="Password" required />

          <div class="modal-buttons">
            <button id="login-cancel" type="button">Cancel</button>
            <button id="login-submit" type="submit">Login</button>
          </div>
        </form>

        <div id="login-message"></div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
