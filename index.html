<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>discord clone</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
      
    <div class="directory">

      <img class = logo src ="logo.png">

    </div>

    <div class = "channel-list">

      <div class = "channel">general</div>
      <div class = "channel">memes</div>
      <div class = "channel">gaming</div>
      <div class = "channel">music</div>

    </div>

    <div class = "chat-area">

      <div class = "messages">
        <div class = "message">
          <span class = "username">user1:</span>
          <span class = "text">Hello everyone!</span>
        </div>
        <div class = "message">
          <span class = "username">user2:</span>
          <span class = "text">Hi user1! How are you?</span>
        </div>
      </div>

      <div class = "input-area">
        <input type="text" id="message-input" placeholder="Message" />
      </div>


    </div>

      <div class = "users-list">
        <div class = "user">user1</div>
        <div class = "user">user2</div>
        <div class = "user">user3</div>

      </div>
  </body>
  <footer>    
    <p id="info"></p>
  </footer>
  <script src="./renderer.js"></script>
</html>
